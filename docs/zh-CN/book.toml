[book]
title = "easyscp"
description = "A feature rich terminal UI file transfer and explorer with support for SCP/SFTP/FTP/Kube/S3/SMB/WebDAV"
language = "zh"
src = "."

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/paulo-amaral/easyscp"
edit-url-template = "https://github.com/paulo-amaral/easyscp/edit/main/docs/zh-CN/{path}"
additional-js = ["lang-switcher.js", "mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
